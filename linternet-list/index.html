<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LinternetList</title>
  <script type="text/javascript" src="mds.js"></script>
  <script type="text/javascript" src="jszip.min.js"></script>
  <script type="text/javascript" src="purify.min.js"></script>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Nav -->
<div class="nav">
  <div class="nav-brand">
    <span class="icon">📑</span>
    <span>Lint</span>
    <span class="sub">all the lints on the pocketWeb</span>
  </div>
  <div class="nav-right">
    <button class="nav-btn" onclick="scanChain()" title="Rescan">↻</button>
    <div class="block-pill">
      <span class="dot"></span>
      Block <strong id="blockNum">—</strong>
    </div>
  </div>
</div>

<!-- Search -->
<div class="search-bar">
  <div class="search-wrap">
    <span class="ico">🔍</span>
    <input type="text" id="searchInput" placeholder="Search the linternet..." oninput="doFilter()">
  </div>
</div>

<!-- Status -->
<div id="statusBar" class="status-bar">Loading...</div>

<!-- Layout: sidebar + main -->
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="side-section">
      <div class="side-label">Categories</div>
      <div id="sideCategories"></div>
    </div>
    <div class="side-section">
      <div class="side-label">Options</div>
      <label class="toggle-label">
        <input type="checkbox" id="showNoDesc" onchange="doFilter()">
        <span>Show no-description lints</span>
      </label>
    </div>
  </aside>
  <main class="main">
    <div class="content" id="content"></div>
    <div class="footer">
      LinternetPlaza &copy; 2025 &middot; <span id="siteTotal">0</span> lints discovered
    </div>
  </main>
</div>

<!-- Mobile sidebar toggle -->
<button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰</button>

<!-- Scroll-top -->
<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>

/* ══════════════════════════════════════
   CONSTANTS
   ══════════════════════════════════════ */
var MINIWEB_FILE_ADDRESS = "0x4D494E4957454220524F434B5321";

var ALL_SITES = [];
var FILTERED  = [];
var RENDERED  = 0;
var BATCH     = 40;
var ALL_CATEGORIES = [];  // sorted unique hashtags
var activeCategory = 'all';

// Cache: name -> preview srcdoc HTML (so we don't re-extract on filter)
var PREVIEW_CACHE = {};

// PocketWeb dapplink — resolved once, reused
var POCKETWEB_DAPPLINK = null;

var COLORS = [
  '#f0c040','#34d399','#5b8def','#fb923c','#a78bfa',
  '#f472b6','#22d3ee','#f87171','#fbbf24','#818cf8',
  '#4ade80','#c084fc','#67e8f9','#fda4af','#bef264'
];

/* ══════════════════════════════════════
   HELPERS
   ══════════════════════════════════════ */
function stripBrackets(s) {
  if (!s) return "";
  s = s.trim();
  if (s.charAt(0) === '[') s = s.substring(1);
  if (s.charAt(s.length - 1) === ']') s = s.substring(0, s.length - 1);
  return s;
}

function decodeDesc(s) {
  try { return decodeURIComponent(s).split("%27").join("'"); }
  catch(e) { return s; }
}

function esc(s) {
  return DOMPurify.sanitize(s);
}

function copyAddr(el) {
  var text = el.textContent;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text);
  } else {
    var range = document.createRange();
    range.selectNodeContents(el);
    var sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    document.execCommand('copy');
  }
  el.classList.add('copied');
  setTimeout(function() { el.classList.remove('copied'); }, 1500);
}

function hexToBytes(hex) {
  if (hex.startsWith('0x')) hex = hex.substring(2);
  var bytes = new Uint8Array(hex.length / 2);
  for (var i = 0; i < hex.length; i += 2) {
    bytes[i / 2] = parseInt(hex.substring(i, i + 2), 16);
  }
  return bytes;
}

function escRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

// Extract #hashtags from a description string
function extractHashtags(desc) {
  if (!desc) return [];
  var matches = desc.match(/#[a-zA-Z0-9_]+/g);
  if (!matches) return [];
  // Normalise to lowercase, deduplicate
  var seen = {};
  var result = [];
  for (var i = 0; i < matches.length; i++) {
    var tag = matches[i].toLowerCase();
    if (!seen[tag]) {
      seen[tag] = true;
      result.push(tag);
    }
  }
  return result;
}

/* ══════════════════════════════════════
   LOAD ALL LINTS
   Strategy: ask pocketFS first (has full DB
   including Maxima-received sites), fall back
   to direct coin scan if pocketFS unavailable
   ══════════════════════════════════════ */
function scanChain() {
  document.getElementById('statusBar').textContent = 'Discovering lints...';
  document.getElementById('content').innerHTML = '';
  RENDERED = 0;

  // Try pocketFS API first — it has the most complete list
  var api = {};
  api.action = "LISTALL";

  MDS.api.call("pocketfs", JSON.stringify(api), function(resp) {
    if (resp.status) {
      var data = resp.data;
      if (typeof data === 'string') {
        try { data = JSON.parse(data); } catch(e) { data = {}; }
      }
      var results = [];
      if (data && Array.isArray(data.results)) results = data.results;

      if (results.length > 0) {
        MDS.log("LINTLIST: pocketFS returned " + results.length + " lints");
        processSiteList(results);
        return;
      }
    }

    // Fallback: direct coin scan
    MDS.log("LINTLIST: pocketFS unavailable, falling back to coin scan");
    scanCoins();
  });
}

// Process results from pocketFS (already structured as filepackets)
function processSiteList(results) {
  var sites = {};
  for (var i = 0; i < results.length; i++) {
    var fp = results[i];
    if (!fp.data || !fp.data.name) continue;

    var name = fp.data.name;
    var desc = fp.data.description || '';
    var version = fp.data.version || 1;
    var file = fp.data.file || '';
    var tags = extractHashtags(desc);

    if (!sites[name] || sites[name].data.version < version) {
      sites[name] = {
        data: {
          name: name,
          description: desc,
          version: version,
          file: file,
          tags: tags
        }
      };
    }
  }
  finaliseSites(sites);
}

// Fallback: scan blockchain coins directly
function scanCoins() {
  document.getElementById('statusBar').textContent = 'Scanning blockchain...';

  MDS.cmd("coins simplestate:true address:" + MINIWEB_FILE_ADDRESS, function(resp) {
    if (!resp.response || resp.response.length === 0) {
      ALL_SITES = [];
      FILTERED = [];
      updateStatus();
      showEmpty();
      return;
    }

    var coins = resp.response;
    var sites = {};

    MDS.log("LINTLIST: coin scan found " + coins.length + " coins");

    for (var i = 0; i < coins.length; i++) {
      var coin = coins[i];
      var st = coin.state;
      if (!st || !st[0]) continue;

      var name = stripBrackets(st[0]);
      if (!name) continue;

      var desc    = st[3] ? decodeDesc(stripBrackets(st[3])) : '';
      var version = st[4] ? (parseInt(st[4]) || 1) : 1;
      var file    = st[5] || '';
      var tags    = extractHashtags(desc);

      if (!sites[name] || sites[name].data.version < version) {
        sites[name] = {
          data: {
            name: name,
            description: desc,
            version: version,
            file: file,
            tags: tags
          }
        };
      }
    }
    finaliseSites(sites);
  });
}

// Common: sort, build categories, render
function finaliseSites(sites) {
  ALL_SITES = Object.values(sites);
  ALL_SITES.sort(function(a, b) {
    return a.data.name.toLowerCase().localeCompare(b.data.name.toLowerCase());
  });

  var catSet = {};
  for (var c = 0; c < ALL_SITES.length; c++) {
    var t = ALL_SITES[c].data.tags || [];
    for (var j = 0; j < t.length; j++) catSet[t[j]] = true;
  }
  ALL_CATEGORIES = Object.keys(catSet).sort();

  MDS.log("LINTLIST: " + ALL_SITES.length + " lints, " + ALL_CATEGORIES.length + " categories");

  renderCategoryChips();
  FILTERED = ALL_SITES.slice();
  activeCategory = 'all';
  updateStatus();

  if (ALL_SITES.length === 0) {
    showEmpty();
  } else {
    doFilter();
  }
}

/* ══════════════════════════════════════
   CATEGORY CHIPS
   ══════════════════════════════════════ */
function renderCategoryChips() {
  // Count lints per category
  var counts = { all: ALL_SITES.length, uncategorised: 0 };
  for (var i = 0; i < ALL_SITES.length; i++) {
    var tags = ALL_SITES[i].data.tags || [];
    if (tags.length === 0) counts.uncategorised++;
    for (var j = 0; j < tags.length; j++) {
      counts[tags[j]] = (counts[tags[j]] || 0) + 1;
    }
  }

  var h = '<button class="side-btn active" onclick="setCategory(\'all\',this)">' +
    '<span class="side-dot" style="background:var(--accent)"></span>All' +
    '<span class="side-cnt">' + counts.all + '</span></button>';

  for (var i = 0; i < ALL_CATEGORIES.length; i++) {
    var tag = ALL_CATEGORIES[i];
    var c = COLORS[i % COLORS.length];
    h += '<button class="side-btn" onclick="setCategory(\'' + tag.replace(/'/g, "\\'") + '\',this)">' +
      '<span class="side-dot" style="background:' + c + '"></span>' + esc(tag) +
      '<span class="side-cnt">' + (counts[tag] || 0) + '</span></button>';
  }

  if (counts.uncategorised > 0) {
    h += '<button class="side-btn" onclick="setCategory(\'uncategorised\',this)">' +
      '<span class="side-dot" style="background:var(--dim)"></span>uncategorised' +
      '<span class="side-cnt">' + counts.uncategorised + '</span></button>';
  }

  document.getElementById('sideCategories').innerHTML = h;
}

function setCategory(cat, btn) {
  activeCategory = cat;
  var btns = document.querySelectorAll('.side-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  if (btn) btn.classList.add('active');
  doFilter();
  // Close sidebar on mobile
  document.getElementById('sidebar').classList.remove('open');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

/* ══════════════════════════════════════
   FILTER — search + category + description toggle
   ══════════════════════════════════════ */
function doFilter() {
  var q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  var showNoDesc = document.getElementById('showNoDesc').checked;

  var items = ALL_SITES;

  // Filter by category
  if (activeCategory === 'uncategorised') {
    items = items.filter(function(site) {
      return !site.data.tags || site.data.tags.length === 0;
    });
  } else if (activeCategory !== 'all') {
    items = items.filter(function(site) {
      return site.data.tags && site.data.tags.indexOf(activeCategory) !== -1;
    });
  }

  // Filter out lints with no description (unless toggle is on)
  if (!showNoDesc) {
    items = items.filter(function(site) {
      var d = (site.data.description || '').trim();
      return d.length > 0;
    });
  }

  // Search filter
  if (q) {
    items = items.filter(function(site) {
      var name = (site.data.name || '').toLowerCase();
      var desc = (site.data.description || '').toLowerCase();
      var tags = (site.data.tags || []).join(' ');
      return name.indexOf(q) !== -1 || desc.indexOf(q) !== -1 || tags.indexOf(q) !== -1;
    });
  }

  FILTERED = items;
  updateStatus();
  RENDERED = 0;
  document.getElementById('content').innerHTML = '';

  if (FILTERED.length === 0 && ALL_SITES.length > 0) {
    document.getElementById('content').innerHTML =
      '<div class="empty"><h3>No matches</h3><p>Try a different search or category.</p></div>';
  } else if (FILTERED.length > 0) {
    renderByCategory();
  }
}

/* ══════════════════════════════════════
   RENDER BY CATEGORY — group tiles under headers
   ══════════════════════════════════════ */
function renderByCategory() {
  var container = document.getElementById('content');
  container.innerHTML = '';

  // Group filtered items by category
  var groups = {};
  var order = [];

  for (var i = 0; i < FILTERED.length; i++) {
    var site = FILTERED[i];
    var tags = site.data.tags || [];
    var cats = tags.length > 0 ? tags : ['uncategorised'];

    for (var j = 0; j < cats.length; j++) {
      var cat = cats[j];
      if (!groups[cat]) {
        groups[cat] = [];
        order.push(cat);
      }
      groups[cat].push(site);
    }
  }

  // Sort: alphabetical, with 'uncategorised' last
  order.sort(function(a, b) {
    if (a === 'uncategorised') return 1;
    if (b === 'uncategorised') return -1;
    return a.localeCompare(b);
  });

  // Render each group
  var globalIndex = 0;
  for (var g = 0; g < order.length; g++) {
    var cat = order[g];
    var sites = groups[cat];

    // Category header
    var header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = '<span class="cat-tag">' + esc(cat) + '</span><span class="cat-count">' + sites.length + '</span>';
    container.appendChild(header);

    // Grid of tiles
    var grid = document.createElement('div');
    grid.className = 'grid';
    for (var s = 0; s < sites.length; s++) {
      grid.appendChild(createTile(sites[s], globalIndex));
      globalIndex++;
    }
    container.appendChild(grid);
  }

  RENDERED = FILTERED.length;
}

function updateStatus() {
  var bar = document.getElementById('statusBar');
  var q = (document.getElementById('searchInput').value || '').trim();
  if (q) {
    bar.innerHTML = '<b>' + FILTERED.length + '</b> of <b>' + ALL_SITES.length + '</b> lints';
  } else {
    bar.innerHTML = '<b>' + ALL_SITES.length + '</b> lints on the linternet';
  }
  document.getElementById('siteTotal').textContent = ALL_SITES.length;
}

/* ══════════════════════════════════════
   RENDER TILES
   ══════════════════════════════════════ */
function renderBatch() {
  var container = document.getElementById('content');
  var end = Math.min(RENDERED + BATCH, FILTERED.length);

  var g = container.querySelector('.grid');
  if (!g) {
    g = document.createElement('div');
    g.className = 'grid';
    container.appendChild(g);
  }

  for (var i = RENDERED; i < end; i++) {
    g.appendChild(createTile(FILTERED[i], i));
  }
  RENDERED = end;
}

function createTile(site, index) {
  var name    = site.data.name || 'Unknown';
  var desc    = site.data.description || 'No description';
  var version = site.data.version || 1;
  var fileHex = site.data.file || '';
  var color   = COLORS[index % COLORS.length];

  // First letter from description, fallback to name
  var letter = 'L';
  if (desc && desc !== 'No description' && desc.length > 0) {
    letter = desc.replace(/[^a-zA-Z]/g, '').charAt(0).toUpperCase() || 'L';
  } else {
    var stripped = name.replace(/^Mx200[A-Z0-9]*/, '');
    letter = stripped.charAt(0).toUpperCase() || name.charAt(0).toUpperCase() || 'L';
  }

  // No truncation — show full address

  // Use a stable ID based on name, not index (survives filtering)
  var previewId = 'pv-' + name.replace(/[^a-zA-Z0-9]/g, '_');

  var tile = document.createElement('div');
  tile.className = 'bm';
  tile.style.setProperty('--tile-color', color);
  tile.style.animationDelay = ((index - (RENDERED || 0)) * 0.03) + 's';

  tile.innerHTML =
    '<div class="bm-bar" style="background:' + color + '"></div>' +
    '<div class="bm-preview" id="' + previewId + '">' +
    '  <div class="bm-preview-placeholder" style="background:' + color + '">' + esc(letter) + '</div>' +
    '</div>' +
    '<div class="bm-body">' +
    '  <div class="bm-tag" style="color:' + color + '">v' + version + '</div>' +
    '  <p class="bm-desc">' + esc(desc) + '</p>' +
    '  <div class="bm-path" onclick="event.stopPropagation();copyAddr(this)" title="Click to copy">' + esc(name) + '</div>' +
    '</div>';

  // Click → open in PocketWeb
  tile.addEventListener('click', function() {
    openInPocketWeb(name);
  });

  // Generate preview (uses cache, no flicker)
  if (fileHex) {
    attachPreview(previewId, name, fileHex, color, letter);
  }

  return tile;
}

/* ══════════════════════════════════════
   PREVIEW — extract once, cache, no flicker
   ══════════════════════════════════════ */
function attachPreview(elementId, name, hexData, color, letter) {

  // Already cached? Apply immediately
  if (PREVIEW_CACHE[name]) {
    setTimeout(function() {
      applyPreviewToElement(elementId, PREVIEW_CACHE[name]);
    }, 50);
    return;
  }

  // Extract from ZIP
  try {
    var bytes = hexToBytes(hexData);
    var blob = new Blob([bytes], { type: 'application/zip' });

    JSZip.loadAsync(blob).then(function(zip) {
      var indexFile = null;
      zip.forEach(function(path, entry) {
        if (!entry.dir) {
          var lp = path.toLowerCase();
          if (lp === 'index.html' || lp.endsWith('/index.html')) {
            if (!indexFile || path.length < indexFile.length) indexFile = path;
          }
        }
      });
      if (!indexFile) {
        zip.forEach(function(path, entry) {
          if (!entry.dir && path.toLowerCase().endsWith('.html') && !indexFile) {
            indexFile = path;
          }
        });
      }
      if (!indexFile) return;

      zip.file(indexFile).async('string').then(function(html) {
        var cssPattern = /href=["']([^"']+\.css)["']/g;
        var match;
        var cssPromises = [];
        while ((match = cssPattern.exec(html)) !== null) {
          cssPromises.push(loadZipFile(zip, match[1], indexFile));
        }

        Promise.all(cssPromises).then(function(cssFiles) {
          var cssBlock = '';
          for (var c = 0; c < cssFiles.length; c++) {
            if (cssFiles[c].content) {
              cssBlock += '<style>' + cssFiles[c].content + '</style>';
              html = html.replace(new RegExp('<link[^>]*href=["\']' + escRegex(cssFiles[c].name) + '["\'][^>]*>', 'g'), '');
            }
          }

          // Strip all scripts
          html = html.replace(/<script[\s\S]*?<\/script>/gi, '');

          // Insert CSS after <head>
          if (html.indexOf('<head') !== -1) {
            html = html.replace(/<head([^>]*)>/i, '<head$1>' + cssBlock);
          } else {
            html = cssBlock + html;
          }

          // Cache it
          PREVIEW_CACHE[name] = html;

          // Apply to element if still in DOM
          applyPreviewToElement(elementId, html);
        });
      });
    }).catch(function() {});
  } catch(e) {}
}

function applyPreviewToElement(elementId, srcdocHtml) {
  var el = document.getElementById(elementId);
  if (!el) return;

  // Already has an iframe? Don't touch it (prevents flicker)
  if (el.querySelector('iframe')) return;

  var iframe = document.createElement('iframe');
  iframe.className = 'bm-preview-frame';
  iframe.sandbox = 'allow-same-origin';
  iframe.srcdoc = srcdocHtml;
  iframe.tabIndex = -1;

  // Hide placeholder, show iframe — no removal, no flicker
  var placeholder = el.querySelector('.bm-preview-placeholder');
  if (placeholder) placeholder.style.display = 'none';
  el.appendChild(iframe);
}

function loadZipFile(zip, filename, relativeTo) {
  var base = relativeTo.substring(0, relativeTo.lastIndexOf('/') + 1);
  var resolved = filename;
  if (!filename.startsWith('/') && !filename.startsWith('http')) {
    resolved = base + filename;
  }
  resolved = resolved.replace(/[^/]+\/\.\.\//g, '');

  var entry = zip.file(resolved) || zip.file(filename);
  if (!entry) {
    return Promise.resolve({ name: filename, content: null });
  }
  return entry.async('string').then(function(content) {
    return { name: filename, content: content };
  });
}

/* ══════════════════════════════════════
   OPEN LINT IN POCKETWEB
   Finds pocketWeb by listing installed MiniDapps,
   then opens browse.html with the mxsite address
   ══════════════════════════════════════ */
// Pre-resolve on init so clicks are synchronous (avoids popup blocker)
function resolvePocketWebLink() {
  MDS.dapplink("PocketWeb", function(res) {
    if (res.status && res.uid && res.sessionid) {
      POCKETWEB_DAPPLINK = res;
      MDS.log("LINTLIST: PocketWeb resolved uid=" + res.uid);
    }
  });
}

function openInPocketWeb(mxsite) {
  var url = buildPocketWebURL(mxsite);
  if (url) {
    // Resolved — open in new tab (synchronous, won't be blocked)
    window.open(url, '_blank');
  } else {
    // Not yet resolved — try now, navigate in same tab as fallback
    MDS.dapplink("PocketWeb", function(res) {
      if (res.status && res.uid && res.sessionid) {
        POCKETWEB_DAPPLINK = res;
        window.location.href = buildPocketWebURL(mxsite);
      } else {
        MDS.notify("PocketWeb not found — is it installed?");
      }
    });
  }
}

function buildPocketWebURL(mxsite) {
  if (!POCKETWEB_DAPPLINK) return null;
  return MDS.filehost + POCKETWEB_DAPPLINK.uid + "/browse.html?uid=" + POCKETWEB_DAPPLINK.sessionid + "&mxsite=" + mxsite;
}

/* ══════════════════════════════════════
   EMPTY STATE
   ══════════════════════════════════════ */
function showEmpty() {
  document.getElementById('content').innerHTML =
    '<div class="empty">' +
    '<h3>No lints found yet</h3>' +
    '<p>The blockchain is still syncing, or no sites have been published yet.</p>' +
    '</div>';
}

/* ══════════════════════════════════════
   SCROLL + KEYBOARD
   ══════════════════════════════════════ */
window.addEventListener('scroll', function() {
  document.getElementById('scrollTop').classList.toggle('show', window.scrollY > 300);
  if (RENDERED < FILTERED.length) {
    if (window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 300) {
      renderBatch();
    }
  }
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.getElementById('searchInput').value = '';
    document.getElementById('searchInput').blur();
    doFilter();
  }
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

/* ══════════════════════════════════════
   MDS INIT
   ══════════════════════════════════════ */
MDS.init(function(msg) {
  if (msg.event === 'inited') {
    resolvePocketWebLink();
    scanChain();
    MDS.cmd('block', function(res) {
      if (res.response) document.getElementById('blockNum').textContent = res.response.block;
    });
  }
  if (msg.event === 'NEWBLOCK') {
    MDS.cmd('block', function(res) {
      if (res.response) document.getElementById('blockNum').textContent = res.response.block;
    });
  }
});

</script>
</body>
</html>
